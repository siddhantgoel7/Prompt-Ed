name: CI

on:
  push:
    branches:
      - main
      - "sprint-*"
  pull_request:
    branches:
      - main
      - "sprint-*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to run against"
        required: true
        default: "main"

env:
  # Opt into Node.js 24 for all GitHub Actions runners to suppress Node.js 20 deprecation warnings.
  # The app's own Node version is still controlled per-job via actions/setup-node.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Lint
    runs-on: self-hosted
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Restore node_modules cache
        id: cache-node
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-${{ runner.os }}-${{ runner.name }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-${{ runner.name }}-

      - name: Install dependencies (only on cache miss)
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: TypeScript typecheck
    runs-on: self-hosted
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Restore node_modules cache
        id: cache-node
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-${{ runner.os }}-${{ runner.name }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-${{ runner.name }}-

      - name: Install dependencies (only on cache miss)
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Typecheck (no emit)
        run: npx tsc --noEmit

  test-jest:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: "Jest tests (shard ${{ matrix.shard }}/3)"
    runs-on: self-hosted
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Restore node_modules cache
        id: cache-node
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-${{ runner.os }}-${{ runner.name }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-${{ runner.name }}-

      - name: Install dependencies (only on cache miss)
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Jest transform cache
        uses: actions/cache@v4
        with:
          path: /tmp/jest-cache
          key: jest-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            jest-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}-

      - name: Run Jest (shard ${{ matrix.shard }}/3)
        run: npm test -- --shard=${{ matrix.shard }}/3 --maxWorkers=50% --ci --cacheDirectory=/tmp/jest-cache

      - name: Upload coverage (if present)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-shard-${{ matrix.shard }}
          path: app/coverage
          if-no-files-found: ignore
          retention-days: 7

  test-ui:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Playwright UI tests
    runs-on: self-hosted
    needs: [lint, typecheck]
    defaults:
      run:
        working-directory: app
    env:
      CI: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VISION_DEBUG: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Restore node_modules cache
        id: cache-node
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-${{ runner.os }}-${{ runner.name }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-${{ runner.name }}-

      - name: Install dependencies (only on cache miss)
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps --no-shell

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Build app (for UI tests)
        run: npm run build

      - name: Free port 3000 (self-hosted cleanup)
        run: |
          if command -v lsof > /dev/null 2>&1; then
            lsof -ti:3000 | xargs -r kill -9 || true
          elif command -v fuser > /dev/null 2>&1; then
            fuser -k 3000/tcp || true
          else
            echo "Neither lsof nor fuser found; skipping port cleanup"
          fi

      - name: Start app in background
        run: |
          nohup npm run start -- -p 3000 > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-server.pid
          echo "Started Next.js with PID $(cat /tmp/next-server.pid)"

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start"
          cat /tmp/next-start.log
          exit 1

      - name: Run Playwright (without webServer)
        run: npm run test:ui -- --reporter=html
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: true

      - name: Stop Next.js server
        if: always()
        run: |
          if [ -f /tmp/next-server.pid ]; then
            kill $(cat /tmp/next-server.pid) || true
            rm /tmp/next-server.pid
          fi
          if command -v lsof > /dev/null 2>&1; then
            lsof -ti:3000 | xargs -r kill -9 || true
          fi

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: |
            app/playwright-report
            app/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload server log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: next-start-log
          path: /tmp/next-start.log
          if-no-files-found: ignore
          retention-days: 7

  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Build (Next.js)
    runs-on: self-hosted
    needs: [test-jest, test-ui]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Restore node_modules cache
        id: cache-node
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-${{ runner.os }}-${{ runner.name }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-${{ runner.name }}-

      - name: Install dependencies (only on cache miss)
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        run: npm run build
