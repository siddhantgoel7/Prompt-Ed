name: CodeQL Security Analysis

on:
  push:
    branches:
      - main
      - "sprint-*"
  pull_request:
    branches:
      - main
      - "sprint-*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to run against"
        required: true
        default: "main"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set up Node.js (required by CodeQL TypeScript extractor)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Export resolved PATH so CodeQL Java extractor can find node
        # $GITHUB_PATH only injects into the runner's shell wrapper, not into Java
        # subprocesses that CodeQL spawns. Writing to $GITHUB_ENV sets a real process
        # environment variable that is inherited by all child processes including the
        # TypeScript extractor's JVM.
        run: echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: false
          output: sarif-results

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results-${{ matrix.language }}
          path: sarif-results
          retention-days: 30
