# SonarQube Project Configuration parameters
# See: https://docs.sonarqube.org/latest/analysis/analysis-parameters/

sonar.projectKey=W26-DeptOfPharmacology

# Scan only the application code
sonar.sources=app/src
sonar.tests=app/tests

# Identify which files are specifically tests (for coverage reporting)
sonar.test.inclusions=**/*.test.tsx, **/*.test.ts, **/*.spec.ts

# Exclude dependencies, artifacts, and boilerplate
sonar.exclusions=**/node_modules/**, **/.next/**, **/out/**, **/coverage/**, **/public/**, **/dist/**, **/build/**, **/*.md, **/site/**, **/.github/**, **/docs/**, **/test-results/**, 

# Language specific settings (TypeScript/JavaScript)
# Requires 'npm run test:coverage' to have been run before analysis
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# Ignore Tailwind 4 custom at-rules in globals.css (Standard CSS doesn't recognize them)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.e1.resourceKey=app/src/app/globals.css
sonar.typescript.tsconfigPath=app/tsconfig.json
